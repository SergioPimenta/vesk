<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260">

  <!-- FUNDO TRANSPARENTE -->
  <defs>

    <!-- Gradiente marrom -->
    <linearGradient id="brownGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9A320F"/>
      <stop offset="100%" stop-color="#6F1B05"/>
    </linearGradient>

    <!-- Gradiente bege -->
    <linearGradient id="beigeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D2B3"/>
      <stop offset="100%" stop-color="#C9AA84"/>
    </linearGradient>

    <!-- Sombra suave -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

  </defs>

  <!-- ═══════════════════════════════════════
       SIMBOLO PRINCIPAL
  ════════════════════════════════════════ -->

  <!-- Barra inclinada -->
  <polygon
    points="
      70,35
      145,35
      255,200
      180,200
    "
    fill="url(#brownGradient)"
    filter="url(#shadow)"
    stroke="#7B230C"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- Triângulo invertido -->
  <polygon
    points="
      265,40
      355,40
      310,110
    "
    fill="url(#beigeGradient)"
    filter="url(#shadow)"
    stroke="#D7BE9C"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- ═══════════════════════════════════════
       TEXTO
  ════════════════════════════════════════ -->

  <text
    x="410"
    y="118"
    font-family="Montserrat, Arial, sans-serif"
    font-size="88"
    font-weight="800"
    letter-spacing="3"
    fill="#ffffff"
  >
    VESK
  </text>

</svg>
